<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phòng Học eClass - Đội Thanh Niên</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a365d;
            --secondary: #e53e3e;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
        }
        
        /* Chuyển các thuộc tính của thẻ body cũ vào lớp bao bọc (container) mới */
        .eclass-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100%;
            border-radius: 8px;
        }

        /* Giới hạn vùng ảnh hưởng để không làm hỏng CSS chung của hệ thống */
        .eclass-container h1 {
            color: #0056b3; 
            text-transform: uppercase;
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 800;
        }
        .eclass-container #status {
            margin-bottom: 30px;
            font-weight: bold;
            color: #2b6cb0;
            min-height: 24px;
            font-style: italic;
        }
        .classroom {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            max-width: 1000px;
            width: 100%;
        }
        .student {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-top: 5px solid #cbd5e0;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .student.female { border-top-color: #d53f8c; }
        .student.male { border-top-color: #3182ce; }
        
        .student.active {
            transform: scale(1.1) translateY(-10px);
            box-shadow: 0 15px 25px rgba(0,0,0,0.2);
            border-top-color: #48bb78;
            z-index: 10;
        }
        .student.active::after {
            content: 'Đang phát biểu...';
            position: absolute;
            bottom: -35px;
            left: 50%;
            transform: translateX(-50%);
            background: #48bb78;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
        }
        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #edf2f7;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }
        .name {
            font-size: 18px;
            font-weight: bold;
            color: var(--primary);
        }
        .team {
            font-size: 13px;
            color: #718096;
            margin-top: 5px;
        }

        /* Nút micro cho từng sinh viên */
        .mic-icon {
            margin-top: 15px;
            background-color: #f1f5f9;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .mic-icon:hover {
            background-color: #e0f2fe;
            border-color: #0284c7;
            transform: scale(1.15);
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
        }
        .student.active .mic-icon {
            background-color: #48bb78;
            border-color: #2f855a;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(72, 187, 120, 0); }
            100% { box-shadow: 0 0 0 0 rgba(72, 187, 120, 0); }
        }
        
        @media (max-width: 768px) {
            .classroom { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .classroom { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area" style="padding: 0;">
            
            <div class="eclass-container">
                <h1>ĐỘI THANH NIÊN</h1>
                <div id="status">Nhấp vào biểu tượng 🎤 dưới mỗi học viên để yêu cầu phát biểu...</div>

                <div class="classroom" id="classroom">
                    </div>
            </div>

        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>

    <script>
        const studentsData = [
            {
                id: 1,
                name: "Thảo Tâm",
                gender: "female",
                team: "Đội Thanh niên",
                pitch: 1.3,
                rate: 1.0,
                text: "Thưa thầy và các bạn, cảm ơn phần thuyết trình của Đội Búa Liềm, đã đưa ra nhiều lập luận để phản bác quan điểm, tuy nhiên đội nhận thấy rằng nhiều quốc gia như Mỹ, Anh, EU đạt phát triển mạnh mẽ bằng kinh tế thị trường tự do. Chủ nghĩa xã hội không còn là mô hình lý tưởng, thậm chí gây trì trệ, nghèo đói. Đội Búa Liềm lý giải thế nào?"
            },
            {
                id: 2,
                name: "Thanh Sang",
                gender: "male",
                team: "Đội Thanh niên",
                pitch: 0.85,
                rate: 1.05,
                text: "Em thống nhất với những cơ sở thực tiễn thuyết phục các đồng chí Búa Liềm đưa ra, tuy nhiên hiện nay có ý kiến cho rằng: “Những quốc gia theo chủ nghĩa xã hội cho thấy việc tập trung quyền lực vào một đội người có thể dẫn đến tham nhũng và chính quyền độc tài, làm tổn hại đến tự do cá nhân”. Những vụ án điển hình trong thời gian qua gây dư luận không tốt như: Việt Á, chuyến bay giải cứu, Trương Mỹ Lan,… Các đồng chí Đội Búa Liềm có thể lý giải điều này."
            },
            {
                id: 3,
                name: "Tường Vi",
                gender: "female",
                team: "Đội Thanh niên",
                pitch: 1.15,
                rate: 1.05,
                text: "Với những điểm các bạn đội Búa Liềm nêu ta thấy đúng đắn, tuy nhiên vẫn chưa thật sự thuyết phục, khi có ý kiến cho rằng quá trình giám sát, phản biện xã hội chỉ mang tính hình thức, chủ nghĩa xã hội vẫn không khuyến khích tự do cá nhân, quyền sở hữu tư nhân, điều này có thể làm giảm động lực cá nhân trong việc đóng góp cho sự phát triển của xã hội. Đội Búa Liềm hãy cho ý kiến về nội dung này."
            },
            {
                id: 4,
                name: "Trung Khang",
                gender: "male",
                team: "Đội Thanh niên",
                pitch: 0.95,
                rate: 1.1,
                text: "Qua phần lý giải vừa rồi, chúng thấy có sự thuyết phục nhất định, tuy nhiên, quan điểm kinh tế thị trường là tự đo, vậy sự định hướng của Đảng, quản lý của Nhà nước đối với thị trường, có làm làm thị trường không linh hoạt, kìm hãm con người sáng tạo hay không?"
            },
            {
                id: 5,
                name: "Mỹ Tiên",
                gender: "female",
                team: "Đội Thanh niên",
                pitch: 1.05,
                rate: 0.95,
                text: "Trong bối cảnh thế giới đa cực, các nước lớn liên tục gây ảnh hưởng, liệu chủ nghĩa xã hội có thể dẫn đến tình trạng cô lập quốc tế, vì các chính sách bảo vệ nền kinh tế nội địa có thể làm giảm khả năng giao thương và hợp tác với các quốc gia khác, từ đó gây ảnh hưởng tiêu cực đến sự phát triển kinh tế và quan hệ quốc tế. Theo các đồng chí, suy nghĩ như thế nào về điều này?"
            },
            {
                id: 6,
                name: "Minh Trường",
                gender: "male",
                team: "Đội Thanh niên",
                pitch: 0.8,
                rate: 0.9,
                text: "Với vai trò là một AI do giảng viên định hướng để thử thách bản lĩnh chính trị và khả năng vận dụng kiến thức của tập thể học viên Đội Búa Liềm và Đội Sao Vàng. Đội Thanh niên xin chúc mừng hai đội đã hoàn thành các thử thách, việc đánh giá kết quả tổng thể xin mời thầy giáo cho ý kiến."
            }
        ];

        const classroomEl = document.getElementById('classroom');
        const statusEl = document.getElementById('status');
        let voices = [];
        let synth = window.speechSynthesis;

        // Render giao diện với nút micro cho từng sinh viên
        studentsData.forEach(student => {
            const studentDiv = document.createElement('div');
            studentDiv.className = `student ${student.gender}`;
            studentDiv.id = `student-${student.name.replace(/\s/g, '').toLowerCase()}`;
            
            const emoji = student.gender === 'female' ? '👩‍🎓' : '👨‍🎓';
            
            studentDiv.innerHTML = `
                <div class="avatar">${emoji}</div>
                <div class="name">${student.name}</div>
                <div class="team">${student.team}</div>
                <button class="mic-icon" onclick="triggerStudent(${student.id})" title="Yêu cầu ${student.name} phát biểu">🎤</button>
            `;
            classroomEl.appendChild(studentDiv);
        });

        // Load danh sách giọng nói tiếng Việt
        function loadVoices() {
            voices = synth.getVoices().filter(voice => voice.lang.includes('vi'));
        }
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        // Hàm gọi trực tiếp sinh viên từ ID khi click vào Micro
        window.triggerStudent = function(id) {
            const student = studentsData.find(s => s.id === id);
            if(student) {
                if (synth.speaking) {
                    synth.cancel(); // Dừng nếu ai đó đang nói
                }
                activateStudent(student);
            }
        };

        // Hàm kích hoạt nhân vật và phát giọng nói
        function activateStudent(student) {
            document.querySelectorAll('.student').forEach(el => el.classList.remove('active'));
            
            const studentCard = document.getElementById(`student-${student.name.replace(/\s/g, '').toLowerCase()}`);
            studentCard.classList.add('active');
            statusEl.innerText = `${student.name} đang phát biểu...`;

            const utterThis = new SpeechSynthesisUtterance(student.text);
            utterThis.lang = 'vi-VN';
            
            if (voices.length > 0) {
                utterThis.voice = voices[0]; 
            }
            
            utterThis.pitch = student.pitch;
            utterThis.rate = student.rate;

            utterThis.onend = function (event) {
                studentCard.classList.remove('active');
                statusEl.innerText = `${student.name} đã trình bày xong. Sẵn sàng gọi tiếp.`;
            };

            utterThis.onerror = function (event) {
                console.error('Lỗi phát âm: ', event);
                studentCard.classList.remove('active');
                statusEl.innerText = "Có lỗi xảy ra khi phát âm.";
            };

            synth.speak(utterThis);
        }
    </script>
</body>
</html>
