<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ bài giảng (eDoc) - TS. Cao Thanh Hùng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .form-group input {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            border-color: #DAA520;
        }
        .btn-submit {
            background-color: #8B0000;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #A52A2A;
        }
        .action-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-action-edit {
            color: #DAA520;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            transition: color 0.3s;
        }
        .btn-action-edit:hover {
            color: #A52A2A;
        }
        .btn-action-delete {
            color: #8B0000;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 16px;
            padding: 0;
            transition: color 0.3s;
        }
        .btn-action-delete:hover {
            color: #A52A2A;
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area">
            <h2>Hồ sơ bài giảng (eDoc)</h2>
            <p>Hệ thống lưu trữ và quản lý tài liệu học tập, hồ sơ bài giảng.</p>

            <form id="edoc-form" style="background: #fdf6e9; padding: 20px; margin-bottom: 25px; border: 1px solid #DAA520; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 0; color: #8B0000; border-bottom: 2px solid #DAA520; padding-bottom: 8px;">Thêm Hồ sơ bài giảng mới</h3>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Tên hồ sơ:</label>
                        <input type="text" id="ten_ho_so" placeholder="Nhập tên hồ sơ" required>
                    </div>
                    <div class="form-group">
                        <label>Đường dẫn hồ sơ (Google Drive URL):</label>
                        <input type="url" id="duong_dan" placeholder="https://drive.google.com/..." required>
                    </div>
                    <div class="form-group">
                        <label>Ghi chú:</label>
                        <input type="text" id="ghi_chu" placeholder="Nhập ghi chú (nếu có)">
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    + Thêm hồ sơ
                </button>
            </form>

            <div style="overflow-x: auto;">
                <table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px;">
                    <thead>
                        <tr style="background-color: #8B0000; color: #DAA520; text-align: center;">
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: center;">Tên hồ sơ</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: center;">Đường dẫn (Google Drive)</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: center;">Ghi chú</th>
                            <th style="padding: 12px; border: 1px solid #ddd; text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="edoc-data">
                        </tbody>
                </table>
            </div>
        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>
    <script type="module">
        import { supabase } from './js/supabase-client.js';

        // Sửa dữ liệu
        window.editData = async function(id) {
            const { data, error } = await supabase.from('edoc').select('*').eq('id', id);
            if (error || !data.length) return;
            const row = data[0];

            const { value: formValues } = await Swal.fire({
                title: '<span style="color: #8B0000; font-weight: 600;">Chỉnh sửa hồ sơ</span>',
                html: `
                    <div style="text-align: left; font-family: inherit; padding: 0 10px;">
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; color: #8B0000; display: block; margin-bottom: 4px;">Tên hồ sơ</label>
                            <input id="swal-ten_ho_so" type="text" value="${row.ten_ho_so || ''}" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none;">
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; color: #8B0000; display: block; margin-bottom: 4px;">Đường dẫn (Google Drive)</label>
                            <input id="swal-duong_dan" type="url" value="${row.duong_dan || ''}" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none;">
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; font-weight: 600; color: #8B0000; display: block; margin-bottom: 4px;">Ghi chú</label>
                            <input id="swal-ghi_chu" type="text" value="${row.ghi_chu || ''}" style="width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; outline: none;">
                        </div>
                    </div>
                `,
                focusConfirm: false,
                confirmButtonColor: '#8B0000',
                confirmButtonText: 'Cập nhật',
                showCancelButton: true,
                cancelButtonText: 'Hủy',
                width: 500,
                preConfirm: () => {
                    return {
                        ten_ho_so: document.getElementById('swal-ten_ho_so').value,
                        duong_dan: document.getElementById('swal-duong_dan').value,
                        ghi_chu: document.getElementById('swal-ghi_chu').value
                    }
                }
            });

            if (formValues) {
                const { error } = await supabase.from('edoc').update(formValues).eq('id', id);
                if (error) {
                    Swal.fire('Lỗi', error.message, 'error');
                } else {
                    Swal.fire('Thành công!', 'Cập nhật hồ sơ thành công!', 'success');
                    loadData();
                }
            }
        };

        // Xóa dữ liệu
        window.deleteData = async function(id) {
            Swal.fire({
                title: 'Xác nhận xóa?',
                text: "Thao tác này sẽ xóa vĩnh viễn hồ sơ này!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#8B0000',
                cancelButtonColor: '#ccc',
                confirmButtonText: 'Xóa',
                cancelButtonText: 'Hủy'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const { error } = await supabase.from('edoc').delete().eq('id', id);
                    if (error) {
                        Swal.fire('Lỗi', error.message, 'error');
                    } else {
                        Swal.fire('Đã xóa!', 'Đã xóa hồ sơ khỏi hệ thống.', 'success');
                        loadData();
                    }
                }
            });
        };

        // Tải dữ liệu từ Supabase
        async function loadData() {
            const { data, error } = await supabase.from('edoc').select('*').order('id', { ascending: false });
            const tbody = document.getElementById('edoc-data');
            tbody.innerHTML = '';

            if (error) {
                console.error('Lỗi tải dữ liệu: ', error.message);
                Swal.fire({
                    icon: 'error',
                    title: 'Lỗi hệ thống',
                    text: 'Không thể tải dữ liệu!'
                });
                return;
            }

            if (data && data.length > 0) {
                data.forEach(row => {
                    tbody.innerHTML += `
                        <tr>
                            <td style="padding: 10px; border: 1px solid #ddd; text-align: center;"><strong>${row.ten_ho_so || ''}</strong></td>
                            <td style="padding: 10px; border: 1px solid #ddd; text-align: center;">
                                <a href="${row.duong_dan || '#'}" target="_blank" style="color: #DAA520; text-decoration: underline;" title="Xem file">
                                    ${row.duong_dan || 'Chưa có'}
                                </a>
                            </td>
                            <td style="padding: 10px; border: 1px solid #ddd; text-align: center;">${row.ghi_chu || ''}</td>
                            <td style="padding: 10px; border: 1px solid #ddd;">
                                <div class="action-container">
                                    <button class="btn-action-edit" onclick="editData(${row.id})" title="Chỉnh sửa"><i class="fas fa-edit"></i></button>
                                    <button class="btn-action-delete" onclick="deleteData(${row.id})" title="Xóa"><i class="fas fa-trash-alt"></i></button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        // Xử lý sự kiện submit form để thêm mới
        document.getElementById('edoc-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newData = {
                ten_ho_so: document.getElementById('ten_ho_so').value,
                duong_dan: document.getElementById('duong_dan').value,
                ghi_chu: document.getElementById('ghi_chu').value
            };

            const { error } = await supabase.from('edoc').insert([newData]);

            if (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Thêm thất bại',
                    text: error.message
                });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'Thành công!',
                    text: 'Đã thêm hồ sơ thành công',
                    confirmButtonColor: '#8B0000'
                });
                document.getElementById('edoc-form').reset();
                loadData();
            }
        });

        // Tải dữ liệu khi mở trang
        loadData();
    </script>
</body>
</html>
