<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ bài giảng (eDoc) - TS. Cao Thanh Hùng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --primary-color: #8B0000;
            --secondary-color: #DAA520;
            --bg-light: #fdf6e9;
            --border-color: #DAA520;
        }

        .header-action {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .btn-admin {
            background-color: var(--secondary-color);
            color: var(--primary-color);
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-admin:hover {
            background-color: #c59b27;
            transform: translateY(-2px);
        }

        /* Thanh tìm kiếm */
        .search-container {
            background: var(--bg-light);
            padding: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .search-container input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 5px rgba(139, 0, 0, 0.2);
        }

        /* Lưới thẻ hồ sơ */
        .edoc-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .doc-card {
            background: #fff;
            border: 1px solid #eaeaea;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s, box-shadow 0.3s;
            border-bottom: 4px solid var(--primary-color);
        }

        .doc-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            border-bottom-color: var(--secondary-color);
        }

        .card-avatar {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: var(--bg-light);
            color: var(--primary-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            margin: 0 auto 15px;
            border: 2px solid var(--secondary-color);
        }

        .card-folder {
            font-size: 12px;
            text-transform: uppercase;
            color: #777;
            font-weight: bold;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 16px;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0 0 10px;
            height: 46px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .card-note {
            font-size: 13px;
            color: #666;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .card-link {
            display: inline-block;
            background-color: var(--primary-color);
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            transition: 0.3s;
        }

        .card-link:hover {
            background-color: #A52A2A;
            box-shadow: 0 4px 8px rgba(139, 0, 0, 0.3);
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: #777;
            font-size: 16px;
            background: #fff;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area">
            <div class="header-action">
                <div>
                    <h2 style="color: var(--primary-color); margin-top: 0; margin-bottom: 5px;">
                        <i class="fas fa-folder-open"></i> Hồ sơ bài giảng (eDoc)
                    </h2>
                    <p style="margin: 0; color: #555;">Hệ thống lưu trữ và quản lý tài liệu điện tử dùng chung.</p>
                </div>
                
                <button class="btn-admin" onclick="loginAdmin()">
                    <i class="fas fa-user-shield"></i> Đăng nhập Quản trị
                </button>
            </div>

            <div class="search-container">
                <i class="fas fa-search" style="color: var(--primary-color); font-size: 20px;"></i>
                <input type="text" id="search-input" placeholder="Gõ để tìm kiếm tên văn bản, hồ sơ bài, ghi chú...">
            </div>

            <div class="edoc-dashboard" id="edoc-dashboard">
                </div>
        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>
    <script type="module">
        import { supabase } from './js/supabase-client.js';

        let allDocuments = [];

        // Yêu cầu mật khẩu để vào trang Admin
        window.loginAdmin = function() {
            Swal.fire({
                title: 'Đăng nhập Quản trị',
                input: 'password',
                inputPlaceholder: 'Nhập mật khẩu (Mặc định: 250289)',
                icon: 'lock',
                showCancelButton: true,
                confirmButtonText: 'Đăng nhập',
                cancelButtonText: 'Hủy',
                confirmButtonColor: '#8B0000',
            }).then((result) => {
                if (result.isConfirmed) {
                    if (result.value === '250289') {
                        // Chuyển hướng sang trang Admin eDoc
                        sessionStorage.setItem('edoc_admin_auth', '250289'); window.location.href = 'edocadmin.html';
                    } else {
                        Swal.fire('Từ chối truy cập', 'Mật khẩu quản trị không chính xác!', 'error');
                    }
                }
            });
        };

        // Tải dữ liệu từ Supabase
        async function loadData() {
            // Hiện loading
            document.getElementById('edoc-dashboard').innerHTML = '<div class="no-data"><i class="fas fa-spinner fa-spin"></i> Đang tải dữ liệu hồ sơ...</div>';

            const { data, error } = await supabase.from('edoc').select('*').order('id', { ascending: false });

            if (error) {
                console.error('Lỗi tải dữ liệu: ', error.message);
                document.getElementById('edoc-dashboard').innerHTML = '<div class="no-data" style="color: red;">Lỗi kết nối máy chủ! Không thể tải dữ liệu.</div>';
                return;
            }

            allDocuments = data || [];
            renderDashboard(allDocuments);
        }

        // Render giao diện Lưới Thẻ phẳng (Không phân Group)
        function renderDashboard(dataArray) {
            const dashboard = document.getElementById('edoc-dashboard');
            dashboard.innerHTML = '';

            if (dataArray.length === 0) {
                dashboard.innerHTML = '<div class="no-data">Không tìm thấy hồ sơ hoặc văn bản nào phù hợp.</div>';
                return;
            }

            let html = '';
            dataArray.forEach(row => {
                // Lấy ký tự đầu làm Avatar
                const firstChar = (row.ten_van_ban || 'V').charAt(0).toUpperCase();
                
                html += `
                    <div class="doc-card">
                        <div>
                            <div class="card-avatar">${firstChar}</div>
                            <div class="card-folder" title="Thư mục/Hồ sơ gốc"><i class="fas fa-folder"></i> ${row.ten_ho_so_bai || 'Chưa phân loại'}</div>
                            <div class="card-title" title="${row.ten_van_ban}">${row.ten_van_ban}</div>
                            <div class="card-note" title="${row.ghi_chu || ''}">${row.ghi_chu || '...'}</div>
                        </div>
                        <a class="card-link" href="${row.duong_dan || '#'}" target="_blank">
                            <i class="fas fa-external-link-alt"></i> Xem tài liệu
                        </a>
                    </div>
                `;
            });

            dashboard.innerHTML = html;
        }

        // Tìm kiếm Real-time
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allDocuments.filter(row => 
                (row.ten_van_ban && row.ten_van_ban.toLowerCase().includes(keyword)) || 
                (row.ten_ho_so_bai && row.ten_ho_so_bai.toLowerCase().includes(keyword)) ||
                (row.ghi_chu && row.ghi_chu.toLowerCase().includes(keyword))
            );
            renderDashboard(filtered);
        });

        // Khởi tạo tải dữ liệu
        loadData();
    </script>
</body>
</html>
