<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ sơ bài giảng (eDoc) - TS. Cao Thanh Hùng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }
        .form-group input, .form-group select {
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #DAA520;
        }
        .btn-submit {
            background-color: #8B0000;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background-color: #A52A2A;
        }
        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 15px;
        }
        .doc-card {
            background: #fff;
            border: 1px solid #DAA520;
            border-radius: 8px;
            padding: 16px;
            width: 230px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #8B0000;
            color: #DAA520;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: bold;
            margin: 0 auto 12px;
        }
        .card-title {
            font-size: 15px;
            font-weight: bold;
            color: #8B0000;
            margin: 0 0 8px;
            height: 40px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .card-link {
            display: block;
            margin-bottom: 8px;
            color: #DAA520;
            font-weight: 500;
            text-decoration: underline;
        }
        .card-note {
            font-size: 12px;
            color: #555;
            margin-bottom: 12px;
            height: 32px;
            overflow: hidden;
        }
        .card-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .btn-action-edit {
            color: #DAA520;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }
        .btn-action-delete {
            color: #8B0000;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 15px;
        }
        .level-1-section {
            margin-bottom: 30px;
        }
        .level-2-section {
            margin-left: 20px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area">
            <h2>1. Hồ sơ bài giảng (eDoc)</h2>
            <p>Hệ thống lưu trữ và quản lý tài liệu học tập theo phân cấp.</p>

            <form id="edoc-form" style="background: #fdf6e9; padding: 20px; margin-bottom: 25px; border: 1px solid #DAA520; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                <h3 style="margin-top: 0; color: #8B0000; border-bottom: 2px solid #DAA520; padding-bottom: 8px;">Thêm hồ sơ bài giảng mới</h3>
                
                <div class="form-grid">
                    <div class="form-group">
                        <label>Cấp 1 (Phân loại):</label>
                        <select id="cap_1" required>
                            <option value="Giáo án">Giáo án</option>
                            <option value="Kế hoạch">Kế hoạch</option>
                            <option value="Báo cáo">Báo cáo</option>
                            <option value="Tài liệu khác">Tài liệu khác</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Cấp 2 (Môn/Chi tiết):</label>
                        <input type="text" id="cap_2" placeholder="Ví dụ: Xây dựng Đảng hoặc Lịch sử Đảng" required>
                    </div>
                    <div class="form-group">
                        <label>Tên hồ sơ:</label>
                        <input type="text" id="ten_ho_so" placeholder="Nhập tên hồ sơ" required>
                    </div>
                    <div class="form-group">
                        <label>Đường dẫn hồ sơ (Google Drive URL):</label>
                        <input type="url" id="duong_dan" placeholder="https://drive.google.com/..." required>
                    </div>
                    <div class="form-group">
                        <label>Ghi chú:</label>
                        <input type="text" id="ghi_chu" placeholder="Nhập ghi chú (nếu có)">
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    + Thêm hồ sơ
                </button>
            </form>

            <div style="background: #fcf8e3; padding: 16px; margin-bottom: 20px; border: 1px solid #faebcc; border-radius: 8px;">
                <h4 style="margin-top: 0; color: #8B0000; margin-bottom: 10px;"><i class="fas fa-search"></i> Tìm kiếm hồ sơ</h4>
                <div class="form-grid" style="margin-bottom: 0;">
                    <div class="form-group">
                        <input type="text" id="search-input" placeholder="Nhập tên hồ sơ cần tìm..." style="background: #fff;">
                    </div>
                </div>
            </div>

            <div id="edoc-dashboard">
                </div>
        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>
    <script type="module">
        import { supabase } from './js/supabase-client.js';

        let allDocuments = [];

        // Hàm tải dữ liệu từ Supabase
        async function loadData() {
            const { data, error } = await supabase.from('edoc').select('*').order('id', { ascending: false });

            if (error) {
                console.error('Lỗi tải dữ liệu: ', error.message);
                Swal.fire({
                    icon: 'error',
                    title: 'Lỗi hệ thống',
                    text: 'Không thể tải dữ liệu eDoc'
                });
                return;
            }

            allDocuments = data || [];
            renderDashboard(allDocuments);
        }

        // Hiển thị ra giao diện phân cấp
        function renderDashboard(dataArray) {
            const dashboard = document.getElementById('edoc-dashboard');
            dashboard.innerHTML = '';

            if (dataArray.length === 0) {
                dashboard.innerHTML = '<p>Chưa có dữ liệu hồ sơ.</p>';
                return;
            }

            // Gom nhóm theo Cấp 1 và Cấp 2
            const grouped = {};
            dataArray.forEach(row => {
                const c1 = row.cap_1 || 'Chưa phân loại';
                const c2 = row.cap_2 || 'Chưa chi tiết';

                if (!grouped[c1]) grouped[c1] = {};
                if (!grouped[c1][c2]) grouped[c1][c2] = [];
                
                grouped[c1][c2].push(row);
            });

            let html = '';
            for (const c1 in grouped) {
                html += `
                    <div class="level-1-section">
                        <h3 style="color: #8B0000; border-bottom: 2px solid #DAA520; padding-bottom: 5px;">${c1}</h3>
                `;

                for (const c2 in grouped[c1]) {
                    html += `
                        <div class="level-2-section">
                            <h4 style="color: #DAA520; margin: 10px 0 15px 0;">${c2}</h4>
                            <div class="card-container">
                    `;

                    grouped[c1][c2].forEach(row => {
                        const firstChar = (row.ten_ho_so || 'H').charAt(0).toUpperCase();

                        html += `
                            <div class="doc-card">
                                <div>
                                    <div class="card-avatar">${firstChar}</div>
                                    <div class="card-title" title="${row.ten_ho_so}">${row.ten_ho_so}</div>
                                    <a class="card-link" href="${row.duong_dan || '#'}" target="_blank">Click vào đây để xem</a>
                                    <div class="card-note">${row.ghi_chu || 'Không có ghi chú'}</div>
                                </div>
                                <div class="card-actions">
                                    <button class="btn-action-edit" onclick="editData(${row.id})" title="Chỉnh sửa">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button class="btn-action-delete" onclick="deleteData(${row.id})" title="Xóa">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </div>
                        `;
                    });

                    html += `</div></div>`; // Đóng card-container và level-2-section
                }

                html += `</div>`; // Đóng level-1-section
            }

            dashboard.innerHTML = html;
        }

        // Tìm kiếm theo thời gian thực
        document.getElementById('search-input').addEventListener('input', (e) => {
            const keyword = e.target.value.toLowerCase();
            const filtered = allDocuments.filter(row => 
                (row.ten_ho_so && row.ten_ho_so.toLowerCase().includes(keyword)) ||
                (row.cap_2 && row.cap_2.toLowerCase().includes(keyword))
            );
            renderDashboard(filtered);
        });

        // Xử lý sự kiện thêm mới
        document.getElementById('edoc-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newData = {
                cap_1: document.getElementById('cap_1').value,
                cap_2: document.getElementById('cap_2').value,
                ten_ho_so: document.getElementById('ten_ho_so').value,
                duong_dan: document.getElementById('duong_dan').value,
                ghi_chu: document.getElementById('ghi_chu').value
            };

            const { error } = await supabase.from('edoc').insert([newData]);

            if (error) {
                Swal.fire({
                    icon: 'error',
                    title: 'Thêm hồ sơ thất bại',
                    text: error.message
                });
            } else {
                Swal.fire({
                    icon: 'success',
                    title: 'Thành công!',
                    text: 'Hồ sơ đã được lưu trữ',
                    confirmButtonColor: '#8B0000'
                });
                document.getElementById('edoc-form').reset();
                loadData();
            }
        });

        // Sửa dữ liệu
        window.editData = async function(id) {
            const { data, error } = await supabase.from('edoc').select('*').eq('id', id);
            if (error || !data.length) return;
            const row = data[0];

            const { value: formValues } = await Swal.fire({
                title: '<span style="color: #8B0000; font-weight: 600;">Chỉnh sửa hồ sơ</span>',
                html: `
                    <div style="text-align: left; font-family: inherit; padding: 0 10px;">
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; color: #8B0000;">Cấp 1</label>
                            <select id="swal-cap_1" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                                <option value="Giáo án" ${row.cap_1 === 'Giáo án' ? 'selected' : ''}>Giáo án</option>
                                <option value="Kế hoạch" ${row.cap_1 === 'Kế hoạch' ? 'selected' : ''}>Kế hoạch</option>
                                <option value="Báo cáo" ${row.cap_1 === 'Báo cáo' ? 'selected' : ''}>Báo cáo</option>
                                <option value="Tài liệu khác" ${row.cap_1 === 'Tài liệu khác' ? 'selected' : ''}>Tài liệu khác</option>
                            </select>
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; color: #8B0000;">Cấp 2</label>
                            <input id="swal-cap_2" type="text" value="${row.cap_2 || ''}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; color: #8B0000;">Tên hồ sơ</label>
                            <input id="swal-ten_ho_so" type="text" value="${row.ten_ho_so || ''}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; color: #8B0000;">Đường dẫn (Google Drive URL)</label>
                            <input id="swal-duong_dan" type="url" value="${row.duong_dan || ''}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                        <div style="margin-bottom: 12px;">
                            <label style="font-size: 13px; color: #8B0000;">Ghi chú</label>
                            <input id="swal-ghi_chu" type="text" value="${row.ghi_chu || ''}" style="width:100%; padding:8px; border:1px solid #ccc; border-radius:4px;">
                        </div>
                    </div>
                `,
                focusConfirm: false,
                confirmButtonColor: '#8B0000',
                confirmButtonText: 'Cập nhật',
                showCancelButton: true,
                cancelButtonText: 'Hủy',
                width: 500,
                preConfirm: () => {
                    return {
                        cap_1: document.getElementById('swal-cap_1').value,
                        cap_2: document.getElementById('swal-cap_2').value,
                        ten_ho_so: document.getElementById('swal-ten_ho_so').value,
                        duong_dan: document.getElementById('swal-duong_dan').value,
                        ghi_chu: document.getElementById('swal-ghi_chu').value
                    }
                }
            });

            if (formValues) {
                const { error } = await supabase.from('edoc').update(formValues).eq('id', id);
                if (error) {
                    Swal.fire('Lỗi', error.message, 'error');
                } else {
                    Swal.fire('Thành công!', 'Cập nhật dữ liệu thành công!', 'success');
                    loadData();
                }
            }
        };

        // Xóa dữ liệu
        window.deleteData = async function(id) {
            Swal.fire({
                title: 'Xác nhận xóa?',
                text: "Thao tác này sẽ xóa vĩnh viễn hồ sơ này!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#8B0000',
                cancelButtonColor: '#ccc',
                confirmButtonText: 'Xóa',
                cancelButtonText: 'Hủy'
            }).then(async (result) => {
                if (result.isConfirmed) {
                    const { error } = await supabase.from('edoc').delete().eq('id', id);
                    if (error) {
                        Swal.fire('Lỗi', error.message, 'error');
                    } else {
                        Swal.fire('Đã xóa!', 'Dữ liệu đã được xóa khỏi hệ thống.', 'success');
                        loadData();
                    }
                }
            });
        };

        loadData();
    </script>
</body>
</html>
