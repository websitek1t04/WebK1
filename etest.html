<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm tra đánh giá (eTest) - TS. Cao Thanh Hùng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #8B0000;
            --secondary: #DAA520;
            --bg-color: #fdf6e9;
        }

        .etest-container {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 60vh;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 5px solid var(--secondary);
            text-align: center;
        }

        .icon-construction {
            font-size: 80px;
            color: var(--secondary);
            margin-bottom: 25px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .etest-container h2 {
            color: var(--primary);
            font-size: 28px;
            margin-bottom: 15px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .etest-container p {
            font-size: 16px;
            color: #555;
            margin-bottom: 35px;
            max-width: 600px;
            line-height: 1.6;
        }

        .btn-home {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(139, 0, 0, 0.2);
        }

        .btn-home:hover {
            background: #600000;
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(139, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area">
            <h2 style="color: #8B0000; border-bottom: 2px solid #DAA520; padding-bottom: 10px; margin-top: 0;">
                📝 KIỂM TRA ĐÁNH GIÁ (eTest)
            </h2>
            
            <div class="etest-container">
                <div class="icon-construction">
                    <i class="fas fa-cogs"></i>
                </div>
                <h2>Tính năng đang được tiếp tục phát triển</h2>
                <p>Mô đun Kiểm tra đánh giá (eTest) đang trong quá trình lập trình và hoàn thiện các chức năng.</p>
                
                <a href="index.html" class="btn-home">
                    <i class="fas fa-home"></i> Về Trang Chủ Hệ Thống
                </a>
            </div>
        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>
</body>
</html>
