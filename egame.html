<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Trò chơi (eGame) - TS. Cao Thanh Hùng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
            padding: 10px;
        }
        .dashboard-card {
            background-color: #fff;
            border: 1px solid #DAA520;
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            text-decoration: none;
            color: #8B0000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease, background-color 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(139,0,0,0.15);
            background-color: #fdf6e9;
        }
        .card-icon {
            font-size: 45px;
            margin-bottom: 15px;
        }
        .card-title {
            font-size: 16px;
            font-weight: bold;
            margin: 0;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area">
            <h2 style="color: #8B0000; border-bottom: 2px solid #DAA520; padding-bottom: 10px; margin-top: 0;">
                🎮 TỔNG HỢP TRÒ CHƠI SƯ PHẠM (eGame)
            </h2>
            <p style="font-size: 15px; color: #333;">Chọn một mô-đun trò chơi dưới đây để bắt đầu. Hệ thống sẽ tự động mở trong tab mới.</p>

            <div class="dashboard-grid">
                
                <a href="equiz.html" target="_blank" class="dashboard-card">
                    <div class="card-icon">📝</div>
                    <div class="card-title">1. Trắc nghiệm (eQuiz)</div>
                </a>

                <a href="doingoai.html" target="_blank" class="dashboard-card">
                    <div class="card-icon">🤝</div>
                    <div class="card-title">2. Trò chơi Đối ngoại</div>
                </a>

                <a href="kinhte.html" target="_blank" class="dashboard-card">
                    <div class="card-icon">📈</div>
                    <div class="card-title">3. Trò chơi Kinh tế</div>
                </a>
                <a href="chude.html" target="_blank" class="dashboard-card">
                    <div class="card-icon">📈</div>
                    <div class="card-title">Chọn chủ đề/học viên</div>
                </a>


            </div>
        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>
</body>
</html>
