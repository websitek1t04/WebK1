<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phản hồi sư phạm (eForm) - TS. Cao Thanh Hùng</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 25px;
            padding: 10px;
        }
        .dashboard-card {
            background-color: #fff;
            border: 1px solid #DAA520;
            border-radius: 12px;
            padding: 35px 20px;
            text-align: center;
            text-decoration: none;
            color: #8B0000;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-top: 5px solid #8B0000;
        }
        .dashboard-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 20px rgba(139,0,0,0.15);
            background-color: #fdf6e9;
            border-top-color: #DAA520;
        }
        .card-icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: #DAA520;
        }
        .card-title {
            font-size: 17px;
            font-weight: bold;
            margin: 0;
            line-height: 1.5;
            text-transform: uppercase;
        }
        
        /* Hiệu ứng xuất hiện */
        .dashboard-card {
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
        }
        .dashboard-card:nth-child(1) { animation-delay: 0.1s; }
        .dashboard-card:nth-child(2) { animation-delay: 0.2s; }
        .dashboard-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="banner-area"></div>

    <div id="main-layout">
        <aside id="sidebar-area"></aside>
        
        <main id="content-area">
            <h2 style="color: #8B0000; border-bottom: 2px solid #DAA520; padding-bottom: 10px; margin-top: 0;">
                📊 Ý KIẾN NGƯỜI HỌC (eForm)
            </h2>
            <p style="font-size: 15px; color: #333;">Hệ thống thu thập ý kiến phản hồi và khảo sát chất lượng giảng dạy. Vui lòng chọn mục tương ứng bên dưới:</p>

            <div class="dashboard-grid">
                
                <a href="https://docs.google.com/forms/d/e/1FAIpQLSeoq_O_5-gJIosXaJandRRIOWew6FVP3GqIOcDqDSjCYVL-Rg/viewform" target="_blank" class="dashboard-card">
                    <div class="card-icon"><i class="fas fa-chalkboard-teacher"></i></div>
                    <div class="card-title">1. Đánh giá giờ giảng</div>
                </a>

                <a href="https://forms.gle/LfjnNGXBT5LzyL3D8" target="_blank" class="dashboard-card">
                    <div class="card-icon"><i class="fas fa-map-marked-alt"></i></div>
                    <div class="card-title">2. Khảo sát hoạt động<br>thực tế môn học</div>
                </a>

                <a href="https://docs.google.com/forms/d/e/1FAIpQLSdYbH_qIQVCobSNRD2E-y2cNTyCg5qlIP5hVIUO7biUXFzQwg/viewform" target="_blank" class="dashboard-card">
                    <div class="card-icon"><i class="fas fa-calendar-check"></i></div>
                    <div class="card-title">3. Khảo sát hoạt động<br>thực tế (21 ngày)</div>
                </a>

            </div>
        </main>
    </div>

    <footer id="footer-area"></footer>

    <script src="js/main.js"></script>
</body>
</html>
