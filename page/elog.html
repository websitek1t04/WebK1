<h2>2. Sổ đầu bài (eLog)</h2>
<p>Hệ thống theo dõi và ghi nhận chất lượng học tập, quân số của học viên.</p>

<form id="elog-form" style="background: #fdf6e9; padding: 15px; margin-bottom: 20px; border: 1px solid #DAA520; border-radius: 6px;">
    <h3 style="margin-top: 0; color: #8B0000;">Thêm dữ liệu Sổ đầu bài</h3>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <label style="font-size: 13px;">Ngày tháng năm:</label>
            <input type="date" id="ngay_thang" required style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Môn:</label>
            <input type="text" id="mon" required style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Lớp:</label>
            <input type="text" id="lop" required style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Quân số:</label>
            <input type="text" id="quan_so" required style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Mã HV vắng:</label>
            <input type="text" id="ma_hv_vang" style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Mã HV phát biểu:</label>
            <input type="text" id="ma_hv_phat_bieu" style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Chất lượng học tập:</label>
            <input type="text" id="chat_luong" style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
        <div>
            <label style="font-size: 13px;">Lưu ý:</label>
            <input type="text" id="luu_y" style="width: 100%; padding: 6px; margin-top: 4px;">
        </div>
    </div>
    <button type="submit" style="margin-top: 15px; background-color: #8B0000; color: #fff; padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
        + Thêm dữ liệu
    </button>
</form>

<table style="width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px;">
    <thead>
        <tr style="background-color: #8B0000; color: #DAA520; text-align: left;">
            <th style="padding: 10px; border: 1px solid #ddd;">Ngày tháng năm</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Môn</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Lớp</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Quân số</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Mã HV vắng</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Mã HV phát biểu</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Chất lượng</th>
            <th style="padding: 10px; border: 1px solid #ddd;">Lưu ý</th>
        </tr>
    </thead>
    <tbody id="elog-data">
        </tbody>
</table>

<script type="module">
    import { supabase } from '../js/supabase-client.js';

    // Hàm tải dữ liệu từ Supabase
    async function loadData() {
        const { data, error } = await supabase.from('elog').select('*').order('id', { ascending: false });
        const tbody = document.getElementById('elog-data');
        tbody.innerHTML = '';

        if (error) {
            console.error('Lỗi tải dữ liệu: ', error.message);
            return;
        }

        if (data && data.length > 0) {
            data.forEach(row => {
                tbody.innerHTML += `
                    <tr>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.ngay_thang || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.mon || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.lop || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.quan_so || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.ma_hv_vang || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.ma_hv_phat_bieu || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.chat_luong || ''}</td>
                        <td style="padding: 10px; border: 1px solid #ddd;">${row.luu_y || ''}</td>
                    </tr>
                `;
            });
        }
    }

    // Xử lý sự kiện khi thêm mới
    document.getElementById('elog-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const newData = {
            ngay_thang: document.getElementById('ngay_thang').value,
            mon: document.getElementById('mon').value,
            lop: document.getElementById('lop').value,
            quan_so: document.getElementById('quan_so').value,
            ma_hv_vang: document.getElementById('ma_hv_vang').value,
            ma_hv_phat_bieu: document.getElementById('ma_hv_phat_bieu').value,
            chat_luong: document.getElementById('chat_luong').value,
            luu_y: document.getElementById('luu_y').value
        };

        const { error } = await supabase.from('elog').insert([newData]);

        if (error) {
            alert('Lỗi: ' + error.message);
        } else {
            alert('Thêm sổ đầu bài thành công!');
            document.getElementById('elog-form').reset();
            loadData();
        }
    });

    // Tải dữ liệu khi mở trang
    loadData();
</script>
